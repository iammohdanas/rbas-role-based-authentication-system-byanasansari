{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Your Name">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="description" content="Premium Login Page - Rays Power Infra">
    <title>Login | Rays Power Infra</title>
    
    <link rel="icon" href="{% static 'images/rays_logo.png' %}">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Animate.css for entrance animations -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --primary-color: #007bff;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body, html {
            height: 100%;
            margin: 0;
            overflow-x: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Animated Background */
        .bg-animated {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url("{% static 'images/login_background.png' %}");
            background-size: cover;
            background-position: center;
            z-index: -1;
            transform: scale(1.1);
            animation: slowZoom 20s infinite alternate ease-in-out;
        }

        @keyframes slowZoom {
            from { transform: scale(1); }
            to { transform: scale(1.15); }
        }

        /* Glassmorphism Card */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2) !important;
        }

        /* Input Styling */
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1px solid #ddd;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            box-shadow: 0 0 10px rgba(0, 123, 255, 0.25);
            border-color: var(--primary-color);
        }

        /* Button Styling */
        .btn-primary {
            border-radius: 10px;
            padding: 10px 30px;
            font-weight: 600;
            transition: all 0.3s ease;
            background: linear-gradient(45deg, #007bff, #0056b3);
            border: none;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 123, 255, 0.4);
        }

        /* Back Button */
        .btn-back {
            transition: all 0.3s ease;
            color: white !important;
            background: rgba(0,0,0,0.2);
            border-radius: 50px;
            padding: 5px 20px;
        }

        .btn-back:hover {
            background: rgba(0,0,0,0.5);
            transform: translateX(-5px);
        }

        /* Links */
        a {
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer-text {
            color: rgba(255,255,255,0.8);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>

<body>
    <div class="bg-animated"></div>

    <!-- Back Button -->
    <div class="position-fixed" style="top: 20px; left: 20px; z-index: 100;">
        <a class="btn btn-back animate__animated animate__fadeInLeft" href="javascript:history.back()">
            <i class="fas fa-arrow-left me-2"></i> Back
        </a>
    </div>

    <section class="h-100 d-flex align-items-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-xxl-4 col-xl-5 col-lg-5 col-md-7 col-sm-9">
                    
                    <!-- Logo Section -->
                    <div class="text-center my-4 animate__animated animate__fadeInDown">
                        <img src="{% static 'images/rays_logo.png' %}" alt="logo" style="max-width: 180px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));">
                    </div>

                    <!-- Login Card -->
                    <div class="card shadow-lg animate__animated animate__zoomIn">
                        <div class="card-body p-5">
                            <h1 class="fs-3 card-title fw-bold mb-4 text-center">Welcome Back</h1>
                            
                            {% include '_sys_notifications.html' %}

                            <form method="POST" id="login-form" class="needs-validation" novalidate autocomplete="off">
                                {% csrf_token %}
                                <div class="mb-4">
                                    <label for="username_or_email" class="form-label text-muted">Username or Email</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0"><i class="fas fa-user text-primary"></i></span>
                                        <input id="username_or_email" type="text" name="username_or_email" class="form-control border-start-0" placeholder="Username" required>
                                    </div>
                                    <div class="invalid-feedback">Username is required.</div>
                                </div>

                                <div class="mb-4">
                                    <label for="password" class="form-label text-muted">Password</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-primary"></i></span>
                                        <input id="password" type="password" name="password" class="form-control border-start-0" placeholder="••••••••" required>
                                    </div>
                                    <div class="invalid-feedback">Password is required.</div>
                                </div>

                                <div class="d-flex align-items-center mb-4">
                                    <div class="form-check">
                                        <input type="checkbox" name="remember" id="remember" class="form-check-input">
                                        <label for="remember" class="form-check-label text-muted">Remember Me</label>
                                    </div>
                                    <button type="submit" class="btn btn-primary ms-auto">
                                        Login <i class="fas fa-sign-in-alt ms-2"></i>
                                    </button>
                                </div>
                            </form>
                        </div>
                        <div class="card-footer py-3 border-0 bg-transparent text-center">
                            <div class="mb-2">
                                <a href="{% url 'forgot_password' %}" class="text-primary small">Forgot Password?</a>
                            </div>
                            <div class="small">
                                Don't have an account? <a href="{% url 'register' %}" class="fw-bold">Create One</a>
                            </div>
                        </div>
                    </div>

                    <!-- Copyright -->
                    <div class="text-center mt-4 footer-text animate__animated animate__fadeInUp animate__delay-1s">
                        &copy; <script>document.write(new Date().getFullYear());</script> Rays Power Infra Land Platform.
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Simple JS for Validation -->
    <script>
        (function () {
            'use strict'
            var forms = document.querySelectorAll('.needs-validation')
            Array.prototype.slice.call(forms).forEach(function (form) {
                form.addEventListener('submit', function (event) {
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    }
                    form.classList.add('was-validated')
                }, false)
            })
        })()
    </script>
    <script src="{% static 'js/login.js' %}"></script>
</body>
</html>
