{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Reset Password | Rays Power Infra</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --primary-gradient: linear-gradient(45deg, #0d6efd, #00d4ff);
            --glass-bg: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(255, 255, 255, 0.4);
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        /* Animated Background */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url("{% static 'images/login_background.png' %}");
            background-size: cover;
            background-position: center;
            z-index: -1;
            animation: panBackground 25s infinite alternate ease-in-out;
        }

        @keyframes panBackground {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        /* Glass Card Styling */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        /* Input Styling */
        .form-control {
            border-radius: 12px;
            padding: 12px 15px;
            border: 1px solid #ced4da;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
            border-color: #0d6efd;
        }

        .input-group-text {
            background: transparent;
            border-radius: 12px;
            color: #6c757d;
            cursor: pointer;
        }

        /* Button Styling */
        .btn-primary {
            background: var(--primary-gradient);
            border: none;
            border-radius: 12px;
            padding: 12px 20px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(13, 110, 253, 0.4);
        }

        .btn-back {
            color: white !important;
            background: rgba(0,0,0,0.2);
            border-radius: 50px;
            padding: 8px 20px;
            transition: all 0.3s;
        }

        .btn-back:hover {
            background: rgba(0,0,0,0.4);
            transform: translateX(-5px);
        }

        .footer-text {
            color: rgba(255, 255, 255, 0.85);
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>

    <!-- Back Button -->
    <div class="position-fixed" style="top: 20px; left: 20px; z-index: 1000;">
        <a class="btn btn-back animate__animated animate__fadeInLeft" href="javascript:history.back()">
            <i class="fas fa-arrow-left me-2"></i> Back
        </a>
    </div>

    <section class="h-100 d-flex align-items-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-xxl-4 col-xl-5 col-lg-5 col-md-7 col-sm-9">
                    
                    <!-- Logo -->
                    <div class="text-center mb-4 animate__animated animate__fadeInDown">
                        <img src="{% static 'images/rays_logo.png' %}" alt="Logo" style="width: 150px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));">
                    </div>

                    <!-- Reset Card -->
                    <div class="card shadow-lg animate__animated animate__zoomIn">
                        <div class="card-body p-5">
                            <h1 class="fs-4 fw-bold mb-2">Reset Password</h1>
                            <p class="text-muted small mb-4">Please choose a strong new password to secure your account.</p>

                            {% include '_sys_notifications.html' %}

                            <form method="POST" class="needs-validation" novalidate="" autocomplete="off" action="{% url 'reset_password' otp_token=otp_token %}">
                                {% csrf_token %}
                                
                                <div class="mb-3">
                                    <label class="form-label text-muted" for="new_password">New Password</label>
                                    <div class="input-group">
                                        <input id="new_password" type="password" class="form-control border-end-0" name="new_password" placeholder="••••••••" required autofocus>
                                        <span class="input-group-text border-start-0" onclick="togglePassword('new_password', this)">
                                            <i class="fas fa-eye"></i>
                                        </span>
                                    </div>
                                    <div class="invalid-feedback">Password is required.</div>
                                </div>

                                <div class="mb-4">
                                    <label class="form-label text-muted" for="confirm_password">Confirm New Password</label>
                                    <div class="input-group">
                                        <input id="confirm_password" type="password" class="form-control border-end-0" name="confirm_password" placeholder="••••••••" required>
                                        <span class="input-group-text border-start-0" onclick="togglePassword('confirm_password', this)">
                                            <i class="fas fa-eye"></i>
                                        </span>
                                    </div>
                                    <div class="invalid-feedback">Please confirm your password.</div>
                                </div>

                                <div class="mb-4">
                                    <div class="form-check form-switch">
                                        <input type="checkbox" name="logout_devices" id="logout" class="form-check-input" role="switch">
                                        <label for="logout" class="form-check-label text-muted small">Logout from all other devices</label>
                                    </div>
                                </div>

                                <div class="d-grid">
                                    <button type="submit" class="btn btn-primary">
                                        Update Password <i class="fas fa-check-circle ms-2"></i>
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- Footer -->
                    <div class="text-center mt-5 footer-text animate__animated animate__fadeInUp">
                        &copy; <script>document.write(new Date().getFullYear());</script> Rays Power Infra Land Platform.
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        // Password Visibility Toggle
        function togglePassword(inputId, el) {
            const input = document.getElementById(inputId);
            const icon = el.querySelector('i');
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = "password";
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // Bootstrap Validation
        (function () {
            'use strict'
            var forms = document.querySelectorAll('.needs-validation')
            Array.prototype.slice.call(forms).forEach(function (form) {
                form.addEventListener('submit', function (event) {
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    }
                    form.classList.add('was-validated')
                }, false)
            })
        })()
    </script>
</body>
</html>
