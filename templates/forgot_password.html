{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Forgot Password | Rays Power Infra</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --primary-gradient: linear-gradient(45deg, #007bff, #00d4ff);
            --glass-bg: rgba(255, 255, 255, 0.88);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        /* Consistent Background Animation */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url("{% static 'images/login_background.png' %}");
            background-size: cover;
            background-position: center;
            z-index: -1;
            animation: panBackground 25s infinite alternate ease-in-out;
        }

        @keyframes panBackground {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        /* Glass Card Styling */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.4s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        /* Form Styling */
        .form-control {
            border-radius: 12px;
            padding: 12px 15px;
            border: 1px solid #ced4da;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .form-control:focus {
            box-shadow: 0 0 0 0.25 red rgba(0, 123, 255, 0.15);
            border-color: #007bff;
        }

        .btn-primary {
            background: var(--primary-gradient);
            border: none;
            border-radius: 12px;
            padding: 10px 25px;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .btn-primary:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.4);
        }

        /* Back button styling */
        .btn-back {
            color: white !important;
            background: rgba(0,0,0,0.2);
            border-radius: 50px;
            padding: 8px 20px;
            transition: all 0.3s;
        }

        .btn-back:hover {
            background: rgba(0,0,0,0.4);
            transform: translateX(-5px);
        }

        .footer-text {
            color: rgba(255, 255, 255, 0.85);
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>

    <!-- Navigation -->
    <div class="position-fixed" style="top: 20px; left: 20px; z-index: 1000;">
        <a class="btn btn-back animate__animated animate__fadeInLeft" href="javascript:history.back()">
            <i class="fas fa-arrow-left me-2"></i> Back
        </a>
    </div>

    <section class="h-100 d-flex align-items-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-xxl-4 col-xl-5 col-lg-5 col-md-7 col-sm-9">
                    
                    <!-- Logo Animation -->
                    <div class="text-center my-4 animate__animated animate__fadeInDown">
                        <img src="{% static 'images/rays_logo.png' %}" alt="logo" style="width: 180px; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.2));">
                    </div>

                    <!-- Main Card -->
                    <div class="card shadow-lg animate__animated animate__zoomIn">
                        <div class="card-body p-5">
                            <div class="text-center mb-4">
                                <div class="d-inline-block bg-light p-3 rounded-circle mb-3">
                                    <i class="fas fa-key fa-2x text-primary"></i>
                                </div>
                                <h1 class="fs-4 fw-bold">Forgot Password?</h1>
                                <p class="text-muted small">Enter your details to receive a password reset link.</p>
                            </div>

                            {% include '_sys_notifications.html' %}

                            <form method="POST" class="needs-validation" novalidate="" autocomplete="off" action="{% url 'forgot_password' %}">
                                {% csrf_token %}
                                <div class="mb-4">
                                    <label class="mb-2 text-muted" for="identifier">E-Mail Address / Mobile No.</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-transparent border-end-0 text-muted">
                                            <i class="fas fa-paper-plane"></i>
                                        </span>
                                        <input id="identifier" type="text" class="form-control border-start-0" name="identifier" placeholder="yourname@email.com" required autofocus>
                                    </div>
                                    <div class="invalid-feedback">
                                        Please enter a valid email or phone number.
                                    </div>
                                </div>

                                <div class="d-grid">
                                    <button type="submit" class="btn btn-primary btn-lg">
                                        Send Reset Link
                                    </button>
                                </div>
                            </form>
                        </div>
                        <div class="card-footer py-3 border-0 bg-transparent">
                            <div class="text-center">
                                Remembered your password? <a href="{% url 'login' %}" class="text-primary fw-bold">Login</a>
                            </div>
                        </div>
                    </div>

                    <!-- Footer -->
                    <div class="text-center mt-5 footer-text animate__animated animate__fadeInUp">
                        &copy; <script>document.write(new Date().getFullYear());</script> Rays Power Infra Land Platform.
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Bootstrap & Validation JS -->
    <script>
        (function () {
            'use strict'
            var forms = document.querySelectorAll('.needs-validation')
            Array.prototype.slice.call(forms).forEach(function (form) {
                form.addEventListener('submit', function (event) {
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    }
                    form.classList.add('was-validated')
                }, false)
            })
        })()
    </script>
</body>
</html>
