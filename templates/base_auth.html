{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Rays Power Infra{% endblock %}</title>
    <link rel="icon" href="{% static 'images/rays_logo.png' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url("{% static 'images/login_background.png' %}");
            background-size: cover;
            background-position: center;
            z-index: -1;
            animation: panBackground 25s infinite alternate ease-in-out;
        }

        @keyframes panBackground {
            from { transform: scale(1); }
            to { transform: scale(1.15); }
        }

        .card {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.18);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 45px rgba(0,0,0,0.22);
        }

        .btn-back {
            color: white !important;
            background: rgba(0,0,0,0.22);
            border-radius: 50px;
            padding: 8px 22px;
            border: none;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            background: rgba(0,0,0,0.48);
            transform: translateX(-5px);
        }

        .footer-text {
            color: rgba(255,255,255,0.85);
            text-shadow: 0 2px 4px rgba(0,0,0,0.28);
        }

        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1px solid #ddd;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            box-shadow: 0 0 10px rgba(0,123,255,0.22);
            border-color: #007bff;
        }

        .input-group-text {
            background: transparent;
            border-right: none;
            color: #007bff;
        }

        .btn-primary {
            border-radius: 12px;
            padding: 12px 28px;
            font-weight: 700;
            transition: all 0.3s ease;
            background: linear-gradient(45deg, #007bff, #0056b3);
            border: none;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(0,123,255,0.35);
        }

        .input-group:focus-within {
            box-shadow: 0 4px 12px rgba(0,123,255,0.15);
        }

        .stagger-1 { animation-delay: 0.1s; }
        .stagger-2 { animation-delay: 0.2s; }
        .stagger-3 { animation-delay: 0.3s; }
        .stagger-4 { animation-delay: 0.4s; }

        .otp-input-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 1.75rem;
        }

        .otp-digit {
            width: 50px;
            height: 60px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            border: 2px solid #ced4da;
            border-radius: 12px;
            background: #f8f9fa;
            transition: all 0.3s ease;
        }

        .otp-digit:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 8px rgba(13,110,253,0.2);
            outline: none;
            background: #fff;
            transform: translateY(-2px);
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="bg-overlay"></div>
    <div class="position-fixed" style="top: 20px; left: 20px; z-index: 1000;">
        <a class="btn btn-back animate__animated animate__fadeInLeft" href="javascript:history.back()">
            <i class="fas fa-arrow-left me-2"></i> Back
        </a>
    </div>

    {% block content %}{% endblock %}

    <script>
    (function () {
        'use strict';
        var forms = document.querySelectorAll('.needs-validation');
        Array.prototype.slice.call(forms).forEach(function (form) {
            form.addEventListener('submit', function (event) {
                if (!form.checkValidity()) {
                    event.preventDefault();
                    event.stopPropagation();
                }
                form.classList.add('was-validated');
            }, false);
        });
    })();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.4.4/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/js/bootstrap.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const alerts = document.querySelectorAll('.alert');
            alerts.forEach(function(alert) {
                setTimeout(function() {
                    const bsAlert = new bootstrap.Alert(alert);
                    bsAlert.close();
                }, 5000);
            });
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
