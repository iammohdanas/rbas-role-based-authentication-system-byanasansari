{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Premium Sign Up Page - Rays Power Infra">
    <title>Create Account | Rays Power Infra</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for modern icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --primary-gradient: linear-gradient(45deg, #007bff, #00d4ff);
            --glass-bg: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(255, 255, 255, 0.4);
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url("{% static 'images/login_background.png' %}");
            background-size: cover;
            background-position: center;
            z-index: -1;
            animation: panBackground 30s infinite alternate ease-in-out;
        }

        @keyframes panBackground {
            from { transform: scale(1); }
            to { transform: scale(1.15); }
        }

        /* Glass Card */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        /* Input Styling */
        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #555;
            margin-bottom: 0.4rem;
        }

        .input-group-text {
            background-color: transparent;
            border-right: none;
            color: #007bff;
        }

        .form-control {
            border-radius: 10px;
            padding: 10px 12px;
            border-left: none;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #ced4da;
            background-color: #fff;
        }

        .input-group:focus-within {
            box-shadow: 0 4px 12px rgba(0, 123, 255, 0.15);
            transform: translateY(-2px);
            transition: all 0.3s ease;
        }

        /* Button Styling */
        .btn-primary {
            background: var(--primary-gradient);
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 123, 255, 0.4);
        }

        .btn-back {
            color: white !important;
            background: rgba(0,0,0,0.2);
            border-radius: 50px;
            padding: 8px 20px;
            backdrop-filter: blur(5px);
        }

        .btn-back:hover {
            background: rgba(0,0,0,0.4);
            transform: translateX(-5px);
        }

        /* Staggered entry for inputs */
        .stagger-1 { animation-delay: 0.1s; }
        .stagger-2 { animation-delay: 0.2s; }
        .stagger-3 { animation-delay: 0.3s; }
        .stagger-4 { animation-delay: 0.4s; }

        .footer-text {
            color: rgba(255, 255, 255, 0.8);
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
    </style>
</head>

<body>
    <div class="bg-overlay"></div>

    <div class="position-fixed" style="top: 20px; left: 20px; z-index: 1000;">
        <a class="btn btn-back animate__animated animate__fadeInLeft" href="javascript:history.back()">
            <i class="fas fa-arrow-left me-2"></i> Back
        </a>
    </div>

    <section class="py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-xxl-5 col-xl-6 col-lg-7 col-md-9 col-sm-11">
                    
                    <div class="text-center mb-4 animate__animated animate__fadeInDown">
                        <img src="{% static 'images/rays_logo.png' %}" alt="logo" style="width: 160px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));">
                    </div>

                    <div class="card animate__animated animate__fadeInUp">
                        {% include '_sys_notifications.html' %}
                        <div class="card-body p-4 p-md-5">
                            <h1 class="fs-3 fw-bold mb-1">Create Account</h1>
                            <p class="text-muted mb-4">Join the Rays Power Infra Platform</p>

                            <form method="POST" class="needs-validation" id="register-form" novalidate="" autocomplete="off">
                                {% csrf_token %}
                                
                                <!-- First & Last Name Row -->
                                <div class="row">
                                    <div class="col-md-6 mb-3 animate__animated animate__fadeInLeft stagger-1">
                                        <label class="form-label" for="first_name">First Name</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="fas fa-user-circle"></i></span>
                                            <input type="text" id="first_name" name="first_name" class="form-control" placeholder="John" required>
                                        </div>
                                    </div>
                                    <div class="col-md-6 mb-3 animate__animated animate__fadeInRight stagger-1">
                                        <label class="form-label" for="last_name">Last Name</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="fas fa-user-circle"></i></span>
                                            <input type="text" id="last_name" name="last_name" class="form-control" placeholder="Doe" required>
                                        </div>
                                    </div>
                                </div>

                                <div class="mb-3 animate__animated animate__fadeInUp stagger-2">
                                    <label class="form-label" for="username">Username</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="fas fa-at"></i></span>
                                        <input type="text" id="username" name="username" class="form-control" placeholder="johndoe123" required>
                                    </div>
                                </div>

                                <div class="mb-3 animate__animated animate__fadeInUp stagger-2">
                                    <label class="form-label" for="email">Email Address</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                        <input type="email" id="email" name="email" class="form-control" placeholder="name@example.com" required>
                                    </div>
                                </div>

                                <!-- Password Row -->
                                <div class="row">
                                    <div class="col-md-6 mb-3 animate__animated animate__fadeInUp stagger-3">
                                        <label class="form-label" for="password">Password</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                            <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                                        </div>
                                    </div>
                                    <div class="col-md-6 mb-3 animate__animated animate__fadeInUp stagger-3">
                                        <label class="form-label" for="confirm_password">Confirm</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="fas fa-shield-alt"></i></span>
                                            <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="••••••••" required>
                                        </div>
                                    </div>
                                </div>

                                <div class="mb-3 animate__animated animate__fadeInUp stagger-4">
                                    <label class="form-label" for="mobile_number">Mobile Number</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="fas fa-phone"></i></span>
                                        <input type="text" id="mobile_number" name="mobile_number" class="form-control" placeholder="+91 00000 00000" required>
                                    </div>
                                </div>

                                <div class="mb-4 animate__animated animate__fadeInUp stagger-4">
                                    <div class="form-check">
                                        <input type="checkbox" id="terms_accepted" name="terms_accepted" class="form-check-input" required>
                                        <label for="terms_accepted" class="form-check-label text-muted small">I agree to the <a href="#" class="text-primary">Terms & Conditions</a></label>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <button type="submit" id="signup" class="btn btn-primary w-100 shadow-sm">
                                        Create Account <i class="fas fa-arrow-right ms-2"></i>
                                    </button>
                                </div>

                                <div class="text-center text-muted small animate__animated animate__fadeIn animate__delay-1s">
                                    Already have an account? <a href="{% url 'login' %}" class="text-primary fw-bold">Log in</a>
                                </div>
                            </form>
                        </div>
                    </div>

                    <div class="text-center mt-5 footer-text animate__animated animate__fadeIn">
                        &copy; <script>document.write(new Date().getFullYear());</script> Rays Power Infra Land Platform.
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Form Validation Script -->
    <script>
        (function () {
            'use strict'
            var forms = document.querySelectorAll('.needs-validation')
            Array.prototype.slice.call(forms).forEach(function (form) {
                form.addEventListener('submit', function (event) {
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    }
                    form.classList.add('was-validated')
                }, false)
            })
        })()
    </script>
</body>
</html>
