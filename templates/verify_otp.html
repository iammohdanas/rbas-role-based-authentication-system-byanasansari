{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Verify OTP | Rays Power Infra</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --primary-gradient: linear-gradient(45deg, #0d6efd, #00d4ff);
            --glass-bg: rgba(255, 255, 255, 0.92);
            --glass-border: rgba(255, 255, 255, 0.4);
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        /* Animated Background */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url("{% static 'images/login_background.png' %}");
            background-size: cover;
            background-position: center;
            z-index: -1;
            animation: panBackground 25s infinite alternate ease-in-out;
        }

        @keyframes panBackground {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        /* Glass Card */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        /* Segmented OTP Inputs */
        .otp-input-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .otp-digit {
            width: 50px;
            height: 60px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            border: 2px solid #ced4da;
            border-radius: 12px;
            background: #f8f9fa;
            transition: all 0.3s ease;
        }

        .otp-digit:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 8px rgba(13, 110, 253, 0.2);
            outline: none;
            background: #fff;
            transform: translateY(-3px);
        }

        .btn-primary {
            background: var(--primary-gradient);
            border: none;
            border-radius: 12px;
            padding: 12px 20px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(13, 110, 253, 0.4);
        }

        .btn-back {
            color: white !important;
            background: rgba(0,0,0,0.2);
            border-radius: 50px;
            padding: 8px 20px;
            transition: all 0.3s;
        }

        .footer-text {
            color: rgba(255, 255, 255, 0.85);
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>

    <!-- Back Button -->
    <div class="position-fixed" style="top: 20px; left: 20px; z-index: 1000;">
        <a class="btn btn-back animate__animated animate__fadeInLeft" href="javascript:history.back()">
            <i class="fas fa-arrow-left me-2"></i> Back
        </a>
    </div>

    <section class="h-100 d-flex align-items-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-xxl-4 col-xl-5 col-lg-5 col-md-7 col-sm-9">
                    
                    <div class="text-center mb-4 animate__animated animate__fadeInDown">
                        <img src="{% static 'images/rays_logo.png' %}" alt="Logo" style="width: 150px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));">
                    </div>

                    <div class="card shadow-lg animate__animated animate__zoomIn">
                        <div class="card-body p-5 text-center">
                            <div class="mb-4">
                                <div class="d-inline-block bg-light p-3 rounded-circle mb-3">
                                    <i class="fas fa-shield-halved fa-2x text-primary"></i>
                                </div>
                                <h1 class="fs-4 fw-bold">Two-Step Verification</h1>
                                <p class="text-muted small">Please enter the OTP sent to your registered device.</p>
                            </div>

                            {% include '_sys_notifications.html' %}

                            <form method="POST" id="otp-form" class="needs-validation" novalidate="" autocomplete="off">
                                {% csrf_token %}
                                
                                <!-- Hidden field to store actual OTP value -->
                                <input type="hidden" name="otp" id="final_otp">

                                <div class="otp-input-container">
                                    <input type="text" class="otp-digit" maxlength="1" pattern="\d*" inputmode="numeric" required>
                                    <input type="text" class="otp-digit" maxlength="1" pattern="\d*" inputmode="numeric" required>
                                    <input type="text" class="otp-digit" maxlength="1" pattern="\d*" inputmode="numeric" required>
                                    <input type="text" class="otp-digit" maxlength="1" pattern="\d*" inputmode="numeric" required>
                                    <input type="text" class="otp-digit" maxlength="1" pattern="\d*" inputmode="numeric" required>
                                    <input type="text" class="otp-digit" maxlength="1" pattern="\d*" inputmode="numeric" required>
                                </div>

                                <div class="d-grid mb-3">
                                    <button type="submit" class="btn btn-primary">
                                        Verify OTP <i class="fas fa-lock-open ms-2"></i>
                                    </button>
                                </div>

                                <p class="small text-muted mb-0">
                                    Didn't receive code? <a href="#" class="text-primary fw-bold">Resend OTP</a>
                                </p>
                            </form>
                        </div>
                    </div>

                    <div class="text-center mt-5 footer-text animate__animated animate__fadeInUp">
                        &copy; <script>document.write(new Date().getFullYear());</script> Rays Power Infra Land Platform.
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        // Segmented OTP Logic
        const inputs = document.querySelectorAll('.otp-digit');
        const finalInput = document.getElementById('final_otp');

        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length > 1) {
                    e.target.value = e.target.value.slice(0, 1);
                }
                if (e.target.value && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
                updateFinalValue();
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        function updateFinalValue() {
            let otp = "";
            inputs.forEach(input => otp += input.value);
            finalInput.value = otp;
        }

        // Form Submit
        document.getElementById('otp-form').addEventListener('submit', function(e) {
            updateFinalValue();
            if (finalInput.value.length < 6) {
                e.preventDefault();
                alert("Please enter a complete 6-digit OTP.");
            }
        });
    </script>
</body>
</html>
